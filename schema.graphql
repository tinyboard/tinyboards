scalar Upload
scalar DateTime
scalar JSON

type Query {
  # Auth / Me
  me: MeResponse!

  # Site
  site: LocalSite!
  siteStats: SiteStats!

  # Users
  user(username: String!): User!
  listUsers(searchTerm: String, page: Int, limit: Int): [User!]!
  searchUsernames(query: String!, limit: Int): [String!]!
  userFollowers(userId: ID!): [User!]!
  userFollowing(userId: ID!): [User!]!
  isFollowingUser(userId: ID!): Boolean!

  # Boards
  board(name: String!): Board!
  listBoards(
    limit: Int
    page: Int
    sort: SortType
    listingType: ListingType
    searchTerm: String
    searchTitleAndDesc: Boolean
    bannedBoards: Boolean
  ): [Board!]!

  # Posts
  post(id: ID!): Post!
  listPosts(
    limit: Int
    sort: SortType
    listingType: ListingType
    userId: ID
    boardId: ID
    userName: String
    boardName: String
    savedOnly: Boolean
    removedOnly: Boolean
    includeRemoved: Boolean
    page: Int
  ): [Post!]!

  # Comments
  comment(id: ID!): Comment!
  comments(
    limit: Int
    page: Int
    sort: CommentSortType
    postId: ID
    userId: ID
    boardId: ID
    userName: String
    boardName: String
    removedOnly: Boolean
    includeRemoved: Boolean
  ): [Comment!]!

  # Notifications
  getNotifications(
    unreadOnly: Boolean
    kindFilter: String
    page: Int
    limit: Int
  ): [Notification!]!
  getUnreadNotificationCount: UnreadNotificationCount!

  # Messages
  listConversations: [Conversation!]!
  getConversation(userId: ID!, limit: Int, offset: Int): [PrivateMessage!]!
  getUnreadMessageCount: Int!

  # Search
  searchContent(
    q: String!
    searchType: SearchType
    sort: SortType
    boardId: ID
    creatorId: ID
    page: Int
    limit: Int
  ): SearchResult!

  # Moderation
  getBoardModerators(boardId: ID!): [BoardModerator!]!
  getModeratedBoards(page: Int, limit: Int): [Board!]!
  getBoardSettings(boardId: ID!): BoardSettings!
  getBoardBannedUsers(boardId: ID!, page: Int, limit: Int): [BoardBannedUser!]!
  listBannedUsers(page: Int, limit: Int): BannedUsersResponse!

  # Reports
  getPostReports(boardId: ID, statusFilter: String, limit: Int, offset: Int): [PostReportView!]!
  getCommentReports(boardId: ID, statusFilter: String, limit: Int, offset: Int): [CommentReportView!]!

  # Registration Applications
  listRegistrationApplications(limit: Int, offset: Int): [RegistrationApplication!]!

  # Invites
  listInvites: [SiteInviteGql!]!

  # User settings
  getUserSettings: UserSettings!

  # Notification settings
  getNotificationSettings: NotificationSettings!

  # Wiki
  wikiPage(boardName: String!, slug: String!): WikiPage
  listWikiPages(boardName: String!, includeDeleted: Boolean): [WikiPage!]!
  wikiPageHistory(pageId: ID!): [WikiRevision!]!

  # Emojis
  listEmojis(input: ListEmojisInput): [EmojiObject!]!
  getAllEmojisAdmin(boardId: ID): [EmojiObject!]!

  # Flairs
  boardFlairs(boardId: ID!, flairType: FlairType, activeOnly: Boolean): [FlairTemplate!]!
  manageBoardFlairs(boardId: ID!, flairType: FlairType): [FlairTemplate!]!
  flairTemplate(id: ID!): FlairTemplate

  # Moderation log
  getModerationLog(boardId: ID, actionType: String, moderatorId: ID, limit: Int, offset: Int): ModerationLogResponse!

}

type Mutation {
  # Authentication is handled via REST: POST /api/v2/auth/login and /api/v2/auth/register

  # Posts
  createPost(
    title: String!
    board: String
    body: String
    link: String
    isNSFW: Boolean
    altText: String
    file: Upload
    postType: String
  ): Post!
  editPost(
    id: ID!
    body: String!
    altText: String
  ): Post!
  voteOnPost(postId: ID!, direction: Int!): Post!
  savePost(postId: ID!): Post!
  unsavePost(postId: ID!): Post!
  hidePost(postId: ID!): Post!
  unhidePost(postId: ID!): Post!
  lockPost(postId: ID!): Post!
  unlockPost(postId: ID!): Post!
  featurePost(postId: ID!, featured: Boolean!, featureType: String): Post!
  deletePost(postId: ID!): Post!
  removePost(postId: ID!, reason: String): Post!
  restorePost(postId: ID!): Post!

  # Comments
  createComment(postId: ID!, body: String!, parentId: ID): Comment!
  editComment(id: ID!, body: String!): Comment!
  voteOnComment(commentId: ID!, direction: Int!): Comment!
  saveComment(commentId: ID!): Comment!
  unsaveComment(commentId: ID!): Comment!
  deleteComment(commentId: ID!): Comment!
  removeComment(commentId: ID!, reason: String): Comment!
  restoreComment(commentId: ID!): Comment!
  pinComment(commentId: ID!): Comment!

  # Boards
  createBoard(input: CreateBoardInput!, iconFile: Upload, bannerFile: Upload): CreateBoardResponse!
  updateBoardSettings(input: UpdateBoardSettingsInput!, iconFile: Upload, bannerFile: Upload): UpdateBoardSettingsResponse!
  subscribeToBoard(boardId: ID!): Boolean!
  unsubscribeFromBoard(boardId: ID!): Boolean!

  # Board moderation
  addModerator(boardId: ID!, userId: ID!, permissions: Int): AddModeratorResponse!
  removeBoardModerator(boardId: ID!, userId: ID!): RemoveModeratorResponse!
  transferBoardOwnership(boardId: ID!, newOwnerId: ID!): TransferOwnershipResponse!

  # Users
  followUser(userId: ID!): Boolean!
  unfollowUser(userId: ID!): Boolean!
  blockUser(userId: ID!): Boolean!
  unblockUser(userId: ID!): Boolean!
  blockBoard(boardId: ID!): Boolean!
  unblockBoard(boardId: ID!): Boolean!
  updateSettings(input: UpdateSettingsInput!): UserSettings!
  updateProfile(input: UpdateProfileInput!): User!

  # Messages
  sendMessage(input: SendMessageInput!): SendMessageResponse!
  editMessage(input: EditMessageInput!): EditMessageResponse!
  deleteMessage(messageId: ID!): Boolean!

  # Notifications
  markNotificationsRead(notificationIds: [ID!]!): MarkNotificationsReadResponse!
  deleteNotification(notificationId: ID!): DeleteNotificationResponse!

  # Reports
  reportPost(postId: ID!, reason: String!): ReportResponse!
  reportComment(commentId: ID!, reason: String!): ReportResponse!

  # Registration applications
  approveApplication(applicationId: ID!): Boolean!
  denyApplication(applicationId: ID!, reason: String): Boolean!

  # Site admin
  updateSiteConfig(input: UpdateSiteConfigInput!): LocalSite!
  updateUserBoardCreationApproval(userId: ID!, approved: Boolean!): User!

  # Site moderation
  banUserFromSite(input: BanUserInput!): BanUserResponse!
  unbanUserFromSite(userId: ID!, reason: String): UnbanUserResponse!

  # Admin board moderation
  adminBanBoard(boardId: ID!, publicReason: String!, adminNotes: String): Board!
  adminUnbanBoard(boardId: ID!): Board!
  adminBannedBoards: [Board!]!
  excludeBoardFromAll(boardId: ID!, exclude: Boolean!): Board!
  adminAddSelfAsMod(boardId: ID!, modPerms: Int): Board!
  adminRemoveSelfAsMod(boardId: ID!): Board!

  # Report moderation
  resolveReport(reportId: ID!, reportType: String!): ResolveReportResponse!
  dismissReport(reportId: ID!, reportType: String!): ResolveReportResponse!

  # Notification settings
  updateNotificationSettings(input: UpdateNotificationSettingsInput!): UpdateNotificationSettingsResponse!

  # Notifications (mark all)
  markAllNotificationsAsRead: MarkNotificationsReadResponse!

  # Invites
  createInvite: String!
  deleteInvite(inviteId: ID!): Boolean!

  # Account
  deleteAccount: Boolean!

  # File upload
  uploadFile(file: Upload!): String!

  # Wiki
  createWikiPage(boardId: ID!, input: CreateWikiPageInput!): WikiPage!
  editWikiPage(pageId: ID!, input: EditWikiPageInput!): WikiPage!
  deleteWikiPage(pageId: ID!): Boolean!
  revertWikiPage(pageId: ID!, revisionId: ID!): WikiPage!

  # Flairs
  createFlairTemplate(input: CreateFlairTemplateInput!): FlairTemplate!
  updateFlairTemplate(templateId: ID!, input: UpdateFlairTemplateInput!): FlairTemplate!
  deleteFlairTemplate(templateId: ID!): Boolean!
  assignPostFlair(input: AssignPostFlairInput!): PostFlair!
  removePostFlair(postId: ID!): Boolean!
  assignUserFlair(input: AssignUserFlairInput!): UserFlair!
  removeUserFlair(userId: ID!, boardId: ID!): Boolean!
  approveUserFlair(flairId: ID!, approved: Boolean!): UserFlair!

  # Flair categories
  createFlairCategory(input: CreateFlairCategoryInput!): FlairCategory!
  updateFlairCategory(categoryId: ID!, input: UpdateFlairCategoryInput!): FlairCategory!
  deleteFlairCategory(categoryId: ID!): Boolean!

  # Emojis
  createEmoji(input: CreateEmojiInput!): EmojiObject!
  updateEmoji(emojiId: ID!, input: UpdateEmojiInput!): EmojiObject!
  deleteEmoji(emojiId: ID!): Boolean!

  # Reactions
  addReaction(input: AddReactionInput!): AddReactionResponse!
  removeReaction(input: RemoveReactionInput!): RemoveReactionResponse!
  updateBoardReactionSettings(input: UpdateBoardReactionSettingsInput!): UpdateBoardReactionSettingsResponse!

  # Board bans
  banUserFromBoard(input: BoardBanUserInput!): BoardBanResponse!
  unbanUserFromBoard(boardId: ID!, userId: ID!): BoardUnbanResponse!

}

