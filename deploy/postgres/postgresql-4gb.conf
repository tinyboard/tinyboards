# PostgreSQL tuning for tinyboards — 4 GB RAM tier
#
# Target: 2-4 vCPU, 4 GB RAM VPS (e.g., Hetzner CX31, DigitalOcean Basic $24/mo)
# This is an override fragment. Mount it into the postgres container or
# include it from your main postgresql.conf.
#
# Usage in docker-compose.yml:
#   command: postgres -c config_file=/etc/postgresql/postgresql.conf
#   volumes:
#     - ./deploy/postgres/postgresql-4gb.conf:/etc/postgresql/postgresql.conf:ro

# --- Connection settings ---

# Listen on all interfaces so other containers on the Docker network can connect.
# Network-level isolation is handled by the internal Docker network.
listen_addresses = '*'

# 100 connections. Sufficient for a busy tinyboards instance with multiple
# bb8 pools (main app + background tasks) and admin tooling.
max_connections = 100

# --- Memory settings ---

# 25% of 4 GB = 1 GB. Standard starting point for shared_buffers.
shared_buffers = 1GB

# 75% of 4 GB = 3 GB. Planner hint — tells PostgreSQL that most of the
# working set is likely cached between shared_buffers and OS page cache.
effective_cache_size = 3GB

# With 100 max connections, worst case is 100 * 20MB = 2GB.
# In practice, tinyboards won't have 100 concurrent sort-heavy queries,
# so 20 MB per operation is safe and lets complex queries run efficiently.
work_mem = 20MB

# 256 MB for VACUUM, CREATE INDEX, and other maintenance operations.
# Speeds up maintenance on larger tables (100k+ rows).
maintenance_work_mem = 256MB

# --- WAL / checkpoint settings ---

# 16 MB is the recommended ceiling for wal_buffers.
wal_buffers = 16MB

# Spread checkpoint writes over 90% of the interval.
checkpoint_completion_target = 0.9

# Generous WAL window for an active instance with frequent writes.
min_wal_size = 256MB

# 1 GB max WAL. Suitable for a 4 GB box with 20+ GB disk.
max_wal_size = 1GB

# --- Query planner ---

# 1.1 for SSD. Set to 4.0 for spinning disk (HDD).
random_page_cost = 1.1

# 200 for SSD. Set to 2 for spinning disk (HDD).
effective_io_concurrency = 200

# --- Logging ---

# Log queries slower than 1 second.
log_min_duration_statement = 1000

log_connections = off
log_disconnections = off

# --- Autovacuum ---

# Tuned for active tables with frequent inserts (votes, notifications).
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
