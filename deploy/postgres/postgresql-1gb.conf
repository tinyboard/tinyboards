# PostgreSQL tuning for tinyboards — 1 GB RAM tier
#
# Target: 1 vCPU, 1 GB RAM VPS (e.g., Hetzner CX11, DigitalOcean Basic $6/mo)
# This is an override fragment. Mount it into the postgres container or
# include it from your main postgresql.conf.
#
# Usage in docker-compose.yml:
#   command: postgres -c config_file=/etc/postgresql/postgresql.conf
#   volumes:
#     - ./deploy/postgres/postgresql-1gb.conf:/etc/postgresql/postgresql.conf:ro

# --- Connection settings ---

# Listen on all interfaces so other containers on the Docker network can connect.
# Network-level isolation is handled by the internal Docker network.
listen_addresses = '*'

# Keep low — tinyboards uses a bb8 connection pool of 5-10 connections,
# plus 3-4 synchronous connections for scheduled tasks. 25 leaves headroom
# for admin/monitoring without wasting per-connection memory (~5-10 MB each).
max_connections = 25

# --- Memory settings ---

# 25% of 1 GB = 256 MB. Standard starting point for shared_buffers.
# PostgreSQL uses OS page cache for the rest, so going higher is counterproductive.
shared_buffers = 256MB

# Planner hint for total available cache (shared_buffers + OS page cache).
# 50% of 1 GB. Not an allocation — just tells the planner how much data
# is likely cached, affecting its choice of sequential vs index scans.
effective_cache_size = 512MB

# Per-operation sort/hash memory. With 25 max connections, worst case is
# 25 * 10MB = 250MB, which would exceed RAM. Keep it low for a 1GB box.
# tinyboards queries are simple — most sorts fit in a few MB.
work_mem = 10MB

# Memory for VACUUM, CREATE INDEX, etc. These run one at a time and benefit
# from more memory. 64 MB is sufficient for tables under ~1M rows.
maintenance_work_mem = 64MB

# --- WAL / checkpoint settings ---

# WAL buffer size. 16 MB is the recommended ceiling — going higher
# provides no benefit. Matches well with typical VPS I/O throughput.
wal_buffers = 16MB

# Spread checkpoint writes over 90% of the checkpoint interval to avoid
# I/O spikes. Default 0.9 is optimal for single-disk VPS storage.
checkpoint_completion_target = 0.9

# Minimum WAL retained between checkpoints. 80 MB keeps WAL overhead
# low on a small disk while allowing enough write buffering.
min_wal_size = 80MB

# Maximum WAL before forcing a checkpoint. 256 MB is conservative for
# a 10 GB disk — prevents WAL from consuming too much space.
max_wal_size = 256MB

# --- Query planner ---

# Cost of a random page read relative to sequential. 1.1 assumes SSD storage
# (most modern VPS). Set to 4.0 if running on spinning disk (HDD).
random_page_cost = 1.1

# Number of concurrent I/O requests the disk can handle. 200 is appropriate
# for SSD. Set to 2 for spinning disk (HDD).
effective_io_concurrency = 200

# --- Logging ---

# Log queries slower than 1 second. Helps identify performance issues
# without flooding the logs on a low-traffic instance.
log_min_duration_statement = 1000

# Disable connection logging — adds noise on a single-instance deployment
# where all connections come from the same application.
log_connections = off
log_disconnections = off

# --- Autovacuum ---

# Run autovacuum when 10% of rows have changed (vs default 20%).
# Small tables benefit from more frequent vacuuming since the absolute
# row count threshold (50 rows) is hit quickly anyway.
autovacuum_vacuum_scale_factor = 0.1

# Run auto-analyze when 5% of rows have changed (vs default 10%).
# Keeps query planner statistics fresh on active tables like
# post_aggregates and comment_aggregates.
autovacuum_analyze_scale_factor = 0.05
