# PostgreSQL tuning for tinyboards — 2 GB RAM tier
#
# Target: 1-2 vCPU, 2 GB RAM VPS (e.g., Hetzner CX21, DigitalOcean Basic $12/mo)
# This is an override fragment. Mount it into the postgres container or
# include it from your main postgresql.conf.
#
# Usage in docker-compose.yml:
#   command: postgres -c config_file=/etc/postgresql/postgresql.conf
#   volumes:
#     - ./deploy/postgres/postgresql-2gb.conf:/etc/postgresql/postgresql.conf:ro

# --- Connection settings ---

# Listen on all interfaces so other containers on the Docker network can connect.
# Network-level isolation is handled by the internal Docker network.
listen_addresses = '*'

# 50 connections with a bb8 pool of 5-10 + scheduled task connections.
# Leaves room for pgAdmin, monitoring tools, and manual psql sessions.
max_connections = 50

# --- Memory settings ---

# 25% of 2 GB = 512 MB. Standard starting point for shared_buffers.
shared_buffers = 512MB

# 75% of 2 GB. Planner hint for total available cache — not an allocation.
# Higher ratio than the 1GB tier because there's more headroom.
effective_cache_size = 1536MB

# With 50 max connections, worst case is 50 * 16MB = 800MB.
# tinyboards queries rarely need large sorts, so this is safe.
work_mem = 16MB

# 128 MB for maintenance operations. Speeds up VACUUM and reindexing
# on tables with hundreds of thousands of rows.
maintenance_work_mem = 128MB

# --- WAL / checkpoint settings ---

# 16 MB is the recommended ceiling for wal_buffers.
wal_buffers = 16MB

# Spread checkpoint writes over 90% of the interval.
checkpoint_completion_target = 0.9

# Larger WAL window allows more writes between checkpoints,
# reducing checkpoint frequency on a moderately active instance.
min_wal_size = 128MB

# 512 MB max WAL. Reasonable for a 2 GB box with 10-20 GB disk.
max_wal_size = 512MB

# --- Query planner ---

# 1.1 for SSD. Set to 4.0 for spinning disk (HDD).
random_page_cost = 1.1

# 200 for SSD. Set to 2 for spinning disk (HDD).
effective_io_concurrency = 200

# --- Logging ---

# Log queries slower than 1 second.
log_min_duration_statement = 1000

log_connections = off
log_disconnections = off

# --- Autovacuum ---

# More aggressive than default — keeps statistics fresh for the planner
# on active tables (votes, aggregates, notifications).
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
