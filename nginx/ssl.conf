# SSL configuration for tinyboards
#
# Prerequisites:
#   certbot certonly --webroot -w /var/www/certbot -d yourdomain.com
#   OR: copy your certs to /etc/letsencrypt/live/yourdomain.com/
#
# Usage:
#   1. Replace nginx/default.conf with this file in docker-compose.yml:
#        - ./nginx/ssl.conf:/etc/nginx/conf.d/default.conf:ro
#   2. Mount your certificates:
#        - /etc/letsencrypt:/etc/letsencrypt:ro
#   3. Update DOMAIN below to match your domain
#
# Mozilla Intermediate TLS profile:
#   https://ssl-config.mozilla.org/#server=nginx&config=intermediate

upstream backend  { server backend:8536; }
upstream frontend { server frontend:3000; }

# HTTP — redirect everything to HTTPS
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (needed for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name _;

    # --- SSL certificate paths ---
    # Update these to match your domain
    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

    # --- TLS protocol and cipher configuration ---
    # Mozilla Intermediate compatibility profile
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # SSL session caching for performance
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP stapling for faster TLS handshakes
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/html
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Maximum upload size
    client_max_body_size 50M;

    # --- Backend REST API (direct backend endpoints) ---
    location /api/v2/ {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Pass Set-Cookie headers through for auth endpoints
        proxy_pass_header  Set-Cookie;
    }

    # --- Frontend BFF proxy routes (auth and GraphQL go through Nuxt server) ---
    location /api/ {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- Media files ---
    location /media/ {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache media files on the client for 30 days
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Frontend static assets (Nuxt-generated JS/CSS) ---
    location /_nuxt/ {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Nuxt hashes filenames — safe to cache aggressively
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Frontend (Nuxt SSR) ---
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers (for Nuxt HMR if needed)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Required for Nuxt SSR streaming responses
        proxy_buffering off;
    }
}
