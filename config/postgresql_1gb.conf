# PostgreSQL configuration tuned for 1GB RAM VPS
# Copy this file to config/postgresql.conf before running docker-compose.

# --- Memory ---

# shared_buffers: Main shared memory area for caching table and index data.
# Rule of thumb: 25% of total RAM. On 1GB that's 256MB.
shared_buffers = 256MB

# effective_cache_size: Estimate of total memory available for disk caching
# (shared_buffers + OS page cache). Helps the query planner choose index scans.
# Rule of thumb: 75% of total RAM.
effective_cache_size = 768MB

# work_mem: Memory per sort/hash operation (per query, per operation).
# Keep low on small servers to avoid OOM with concurrent queries.
work_mem = 4MB

# maintenance_work_mem: Memory for maintenance operations (VACUUM, CREATE INDEX).
# Can be higher than work_mem since these run less frequently.
maintenance_work_mem = 64MB

# --- Connections ---

# max_connections: Maximum simultaneous database connections.
# Each connection uses ~5-10MB. Keep low on 1GB servers.
max_connections = 25

# --- Write-Ahead Log ---

# wal_buffers: Shared memory for WAL data not yet written to disk.
# Default is too small; 8MB is a good minimum for any workload.
wal_buffers = 8MB

# checkpoint_completion_target: Fraction of checkpoint interval over which
# dirty pages are flushed. 0.9 spreads writes out, reducing I/O spikes.
checkpoint_completion_target = 0.9

# --- Query Planner ---

# default_statistics_target: Number of histogram buckets for ANALYZE.
# Higher = better query plans but slower ANALYZE. 100 is the default.
default_statistics_target = 100

# random_page_cost: Estimated cost of a random disk page fetch.
# 1.1 for SSD storage (nearly as fast as sequential).
# If using HDD, change to 4.0.
random_page_cost = 1.1

# effective_io_concurrency: Number of concurrent I/O operations the disk can handle.
# 200 is appropriate for SSDs. Set to 2 for spinning disks.
effective_io_concurrency = 200

# --- Autovacuum ---

# autovacuum_vacuum_cost_delay: Delay between autovacuum I/O operations.
# Higher values throttle autovacuum more, reducing impact on queries.
# 10ms is gentle on a 1GB server.
autovacuum_vacuum_cost_delay = 10ms

# --- Logging ---

# log_min_duration_statement: Log queries taking longer than this (ms).
# 1000ms on small servers to catch only the worst offenders.
log_min_duration_statement = 1000

# --- Listening ---
listen_addresses = '*'
