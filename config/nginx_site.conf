# TinyBoards site config — SSL termination + reverse proxy
# Replace REPLACE_WITH_YOUR_DOMAIN with your actual domain name.

upstream backend  { server backend:8536; }
upstream frontend { server frontend:3000; }

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name REPLACE_WITH_YOUR_DOMAIN;

    # --- SSL Configuration ---
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Maximum upload size — must match backend MAX_FILE_SIZE_MB
    client_max_body_size 50M;

    # --- Media files ---
    # Served directly from the shared volume; never hits the backend.
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";

        # Prevent browsers from executing uploaded files
        types { }
        default_type application/octet-stream;
    }

    # --- Auth endpoints — stricter rate limit ---
    location /api/v2/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- Backend API ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- Frontend (Nuxt SSR) ---
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for Nuxt SSR streaming responses
        proxy_buffering off;
    }
}
