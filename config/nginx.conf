# Main nginx configuration — tuned for small VPS (1-4GB RAM)

user nginx;

# Auto-detect CPU cores. On a 1 vCPU server this gives 1 worker.
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    # Max simultaneous connections per worker. 512 is comfortable for small VPS.
    worker_connections 512;

    # Use epoll on Linux for better performance under load.
    use epoll;

    # Accept as many connections as possible at once.
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format with request timing for performance debugging.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Efficient file serving
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Keep-alive settings
    keepalive_timeout 65;
    keepalive_requests 100;

    # Limit request body size globally (overridden per-location if needed)
    client_max_body_size 50M;

    # Buffer sizes for proxied responses
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Rate limiting zones (referenced in site config)
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # Hide nginx version in response headers
    server_tokens off;

    # Include site-specific configs
    include /etc/nginx/conf.d/*.conf;
}
